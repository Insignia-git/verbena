<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Konkurs Verbena - Rejestracja</title>
    <meta name="description" content="Formularz rejestracyjny konkursu Verbena." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .page-wrap { max-width: 980px; margin: 24px auto; }
        .required::after { content: " *"; color: #dc3545; }
    </style>
</head>
<body>
    <div class="container page-wrap">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 mb-1">Konkurs Verbena</h1>
                <p class="text-muted mb-4">Formularz zgłoszeniowy</p>

                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="./rejestracja.html">Rejestracja</a></li>
                    <li class="nav-item"><a class="nav-link" href="./status.html">Status zgłoszenia</a></li>
                    <li class="nav-item"><a class="nav-link" href="./faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="./kontakt.html">Kontakt</a></li>
                </ul>

                <form id="registrationForm" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label required" for="first_name">Imię</label>
                            <input class="form-control" id="first_name" name="first_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required" for="last_name">Nazwisko</label>
                            <input class="form-control" id="last_name" name="last_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required" for="phone">Telefon (9 cyfr)</label>
                            <input class="form-control" id="phone" name="phone" pattern="^[0-9]{9}$" maxlength="9" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required" for="email">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required" for="email_confirm">Potwierdź e-mail</label>
                            <input type="email" class="form-control" id="email_confirm" name="email_confirm" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label required" for="city">Miejscowość</label>
                            <input class="form-control" id="city" name="city" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label required" for="street">Ulica</label>
                            <input class="form-control" id="street" name="street" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label required" for="house_number">Nr domu</label>
                            <input class="form-control" id="house_number" name="house_number" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" for="flat_number">Nr lokalu</label>
                            <input class="form-control" id="flat_number" name="flat_number">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required" for="postal_code">Kod pocztowy</label>
                            <input class="form-control" id="postal_code" name="postal_code" pattern="^[0-9]{2}-[0-9]{3}$" placeholder="00-000" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label required" for="purchase_place">Miejsce zakupu produktów Verbena</label>
                            <input class="form-control" id="purchase_place" name="purchase_place" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required" for="purchase_date">Data zakupu</label>
                            <input type="date" class="form-control" id="purchase_date" name="purchase_date" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label required" for="product_models">Produkty / warianty (opis)</label>
                            <textarea class="form-control" id="product_models" name="product_models" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="receipt_file">Dowód zakupu (JPG/PNG/PDF, max 5 MB)</label>
                            <input type="file" class="form-control" id="receipt_file" name="receipt_file" accept=".jpg,.jpeg,.png,.pdf">
                        </div>
                        <div class="col-12 form-check mt-2">
                            <input class="form-check-input" type="checkbox" value="1" id="consent_rules" name="consent_rules" required>
                            <label class="form-check-label" for="consent_rules">Oświadczam, że zapoznałem/am się z regulaminem konkursu (treść do uzupełnienia po dostarczeniu regulaminu).</label>
                        </div>
                        <div class="col-12 form-check">
                            <input class="form-check-input" type="checkbox" value="1" id="consent_privacy" name="consent_privacy" required>
                            <label class="form-check-label" for="consent_privacy">Wyrażam zgodę na przetwarzanie danych w celu obsługi zgłoszenia konkursowego.</label>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Wyślij zgłoszenie</button>
                    </div>
                </form>

                <div id="result" class="alert d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script>
        const form = document.getElementById('registrationForm');
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        function showResult(type, message) {
            result.className = `alert mt-3 alert-${type}`;
            result.textContent = message;
            result.classList.remove('d-none');
        }

        function getConfig() {
            if (!window.SUPABASE_CONFIG?.url || !window.SUPABASE_CONFIG?.anonKey) {
                showResult('warning', 'Uzupełnij plik supabase-config.js (SUPABASE_CONFIG.url oraz SUPABASE_CONFIG.anonKey).');
                return null;
            }
            return window.SUPABASE_CONFIG;
        }

        function generateSubmissionCode() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const random = Math.floor(10000 + Math.random() * 90000);
            return `VERBENA-${y}${m}${d}-${random}`;
        }

        async function uploadReceiptIfProvided(supabase, cfg, submissionCode, file) {
            if (!file || file.size === 0) return null;

            const ext = file.name.split('.').pop().toLowerCase();
            const allowed = ['jpg', 'jpeg', 'png', 'pdf'];
            if (!allowed.includes(ext)) throw new Error('Dozwolone pliki: JPG, JPEG, PNG, PDF.');
            if (file.size > 5 * 1024 * 1024) throw new Error('Maksymalny rozmiar pliku to 5 MB.');

            const bucket = cfg.bucket || 'konkurs-zgloszenia';
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const filePath = `${submissionCode}/${Date.now()}-${safeName}`;

            const { error } = await supabase.storage.from(bucket).upload(filePath, file, { upsert: false });
            if (error) throw new Error(`Błąd uploadu pliku: ${error.message}`);
            return filePath;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            result.classList.add('d-none');

            if (!form.reportValidity()) return;

            const cfg = getConfig();
            if (!cfg) return;

            const email = document.getElementById('email').value.trim().toLowerCase();
            const emailConfirm = document.getElementById('email_confirm').value.trim().toLowerCase();
            if (email !== emailConfirm) {
                showResult('danger', 'Adres e-mail i potwierdzenie adresu e-mail muszą być identyczne.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Wysyłanie...';

            try {
                const supabase = window.supabase.createClient(cfg.url, cfg.anonKey);
                const formData = new FormData(form);
                const submissionCode = generateSubmissionCode();
                const receiptFile = formData.get('receipt_file');
                const receiptPath = await uploadReceiptIfProvided(supabase, cfg, submissionCode, receiptFile);

                const payload = {
                    submission_code: submissionCode,
                    status: 'NOWE',
                    first_name: formData.get('first_name')?.toString().trim(),
                    last_name: formData.get('last_name')?.toString().trim(),
                    phone: formData.get('phone')?.toString().trim(),
                    email: email,
                    city: formData.get('city')?.toString().trim(),
                    street: formData.get('street')?.toString().trim(),
                    house_number: formData.get('house_number')?.toString().trim(),
                    flat_number: formData.get('flat_number')?.toString().trim() || null,
                    postal_code: formData.get('postal_code')?.toString().trim(),
                    purchase_place: formData.get('purchase_place')?.toString().trim(),
                    purchase_date: formData.get('purchase_date')?.toString().trim(),
                    product_models: formData.get('product_models')?.toString().trim(),
                    attachment_path: receiptPath,
                    consent_rules: formData.get('consent_rules') === '1',
                    consent_privacy: formData.get('consent_privacy') === '1'
                };

                const table = cfg.table || 'contest_submissions';
                const { error } = await supabase.from(table).insert(payload);
                if (error) throw new Error(error.message);

                form.reset();
                showResult('success', `Zgłoszenie zostało zapisane. Twój numer zgłoszenia: ${submissionCode}`);
            } catch (error) {
                showResult('danger', `Nie udało się zapisać zgłoszenia: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Wyślij zgłoszenie';
            }
        });
    </script>
</body>
</html>
