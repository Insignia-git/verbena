<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Konkurs Verbena - Status zgłoszenia</title>
    <meta name="description" content="Sprawdzanie statusu zgłoszenia konkursowego." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .page-wrap { max-width: 980px; margin: 24px auto; }
        .required::after { content: " *"; color: #dc3545; }
    </style>
</head>
<body>
    <div class="container page-wrap">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 mb-1">Konkurs Verbena</h1>
                <p class="text-muted mb-4">Sprawdź status zgłoszenia</p>

                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link" href="./rejestracja.html">Rejestracja</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="./status.html">Status zgłoszenia</a></li>
                    <li class="nav-item"><a class="nav-link" href="./faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="./kontakt.html">Kontakt</a></li>
                </ul>

                <form id="statusForm" class="row g-3">
                    <div class="col-md-7">
                        <label class="form-label required" for="submission_code">Numer zgłoszenia</label>
                        <input type="text" class="form-control" id="submission_code" name="submission_code" placeholder="np. VERBENA-20260225-12345" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label required" for="phone">Telefon użyty przy rejestracji</label>
                        <input type="text" class="form-control" id="phone" name="phone" pattern="^[0-9]{9}$" maxlength="9" required>
                    </div>
                    <div class="col-12 d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary" id="statusBtn">Sprawdź</button>
                    </div>
                </form>

                <div id="result" class="alert d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script>
        const form = document.getElementById('statusForm');
        const result = document.getElementById('result');
        const statusBtn = document.getElementById('statusBtn');

        function showResult(type, message) {
            result.className = `alert mt-3 alert-${type}`;
            result.innerHTML = message;
            result.classList.remove('d-none');
        }

        function getConfig() {
            if (!window.SUPABASE_CONFIG?.url || !window.SUPABASE_CONFIG?.anonKey) {
                showResult('warning', 'Uzupełnij plik supabase-config.js (SUPABASE_CONFIG.url oraz SUPABASE_CONFIG.anonKey).');
                return null;
            }
            return window.SUPABASE_CONFIG;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            result.classList.add('d-none');

            if (!form.reportValidity()) return;
            const cfg = getConfig();
            if (!cfg) return;

            statusBtn.disabled = true;
            statusBtn.textContent = 'Sprawdzanie...';

            try {
                const supabase = window.supabase.createClient(cfg.url, cfg.anonKey);
                const submissionCode = document.getElementById('submission_code').value.trim();
                const phone = document.getElementById('phone').value.trim();

                const rpcName = cfg.statusRpc || 'check_submission_status';
                const { data, error } = await supabase.rpc(rpcName, {
                    p_submission_code: submissionCode,
                    p_phone: phone
                });

                if (error) throw new Error(error.message);

                if (!data || data.length === 0) {
                    showResult('warning', 'Nie znaleziono zgłoszenia dla podanych danych. Sprawdź numer zgłoszenia i telefon.');
                    return;
                }

                const row = data[0];
                const createdAt = row.created_at ? new Date(row.created_at).toLocaleString('pl-PL') : 'brak';
                showResult('success', `
                    <strong>Numer zgłoszenia:</strong> ${row.submission_code}<br>
                    <strong>Status:</strong> ${row.status}<br>
                    <strong>Data rejestracji:</strong> ${createdAt}
                `);
            } catch (error) {
                showResult('danger', `Błąd podczas sprawdzania statusu: ${error.message}`);
            } finally {
                statusBtn.disabled = false;
                statusBtn.textContent = 'Sprawdź';
            }
        });
    </script>
</body>
</html>
